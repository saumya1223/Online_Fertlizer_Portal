name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: npm install
        working-directory: Backend

      - name: Lint root
        run: npm run lint

      - name: Lint backend
        run: npm run lint
        working-directory: Backend

      - name: Check formatting root
        run: npm run format:check

      - name: Check formatting backend
        run: npm run format:check
        working-directory: Backend
